<div class="mt-20">
    <div class="display-area" style="height: calc(100vh - 80px)">
        <div #display_items id="display_items" class="series overflow-auto">
            @for (series of series$ | async; track $index) {
            <div class="series-row">
                @defer (on viewport) {
                <img
                    [src]="series.cover_image"
                    appLazyImage
                    alt="{{ 'cover image for' + series.title }}"
                    (click)="openSeriesDetails(series.series_id)"
                    (keypress)="openSeriesDetails(series.series_id)"
                    tabindex="{$index}"
                    class="cover-image cursor-pointer"
                />
                } @placeholder {
                <div class="cover-image"></div>
                }
                <div class="c c-text">
                    <a
                        class="text tw tw-3"
                        [href]="series.url"
                        target="_blank"
                        >{{ series.title }}</a
                    >
                </div>
                <div class="text al_center c c-text">{{ series.category }}</div>
                <div class="text al_center c c-text">{{ series.status }}</div>
                <input
                    type="checkbox"
                    class="blue-checkbox al_center c"
                    [checked]="series.series_id"
                />
                <div class="flex flex-wrap c c-f">
                    @for (volume of series.volumes; track $index) {
                    <div
                        class="volume-mini-box"
                        [ngStyle]="getVolumeStatusColor(volume)"
                        (click)="openVolumeDetails(volume.isbn)"
                        (keypress)="openVolumeDetails(volume.isbn)"
                        tabindex="{$index}"
                    >
                        <span>{{ volume.volume }}</span>
                    </div>
                    }
                </div>
            </div>

            } @empty {
            <p class="text">Loading...</p>
            }
        </div>
    </div>
</div>
