<div class="app-header flex">
    <div class="flex">
        <h1 class="text">Manga Collector</h1>
        @if (userService.isLoggedIn()) {
            <button class="nav-button text" (click)="routeTo('/series')">My Series</button>
            <button class="nav-button text" (click)="routeTo('/collection')">My Volumes</button>
        }
    </div>
    <div>
        <!-- user icon -->
        @if (userService.isLoggedIn()) {
            <button class="nav-button text" (click)="userService.logout()">Sign Out</button>
        }
        @else {
            <button class="nav-button text" (click)="routeTo('/login')">Login</button>
        }
    </div>
</div>
